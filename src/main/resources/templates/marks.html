<!DOCTYPE html>
<html>
<head>
    <title>Marks Entry</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            text-align: center;
        }
        input, select {
            width: 300px;
            padding: 10px;
            margin: 10px 0;
            display: block;
        }
        button {
            background-color: #38b2ac;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 10px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #38b2ac;
        }
    </style>
</head>
<body>

<h1>Marks Entry</h1>

<input type="number" id="studentId" placeholder="Student ID">
<input type="text" id="subject" placeholder="Subject">
<input type="number" id="marksObtained" placeholder="Marks Obtained">
<input type="number" id="totalMarks" placeholder="Total Marks">
<select id="examType">
    <option value="Midterm">Midterm</option>
    <option value="Final">Final</option>
    <option value="Assignment">Assignment</option>
</select>

<button onclick="saveMarks()">Save Marks</button>

<br>
<a href="/view-marks">View Marks Records</a>
<br>
<a href="/dashboard">Back to Dashboard</a>

<script>
    function saveMarks() {
        let studentId = document.getElementById("studentId").value;
        let subject = document.getElementById("subject").value;
        let marksObtained = document.getElementById("marksObtained").value;
        let totalMarks = document.getElementById("totalMarks").value;
        let examType = document.getElementById("examType").value;

        if (!studentId || !subject || !marksObtained || !totalMarks) {
            alert("Please fill all fields");
            return;
        }

        fetch("/api/marks/add", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                studentId: studentId,
                subject: subject,
                marksObtained: marksObtained,
                totalMarks: totalMarks,
                examType: examType
            })
        })
        .then(response => {
            if (response.ok) {
                alert("Marks Saved Successfully");
                document.getElementById("studentId").value = "";
                document.getElementById("subject").value = "";
                document.getElementById("marksObtained").value = "";
                document.getElementById("totalMarks").value = "";
            } else {
                alert("Failed to save marks");
            }
        })
        .catch(error => alert("Error: " + error));
    }
</script>

</body>
</html>
