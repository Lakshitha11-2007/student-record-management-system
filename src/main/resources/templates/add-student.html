<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav style="background:#14233d; padding:15px 20px; margin-bottom:20px;">
    <a href="/dashboard" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">Dashboard</a>
    <a href="/add-student" style="color:white; margin-right:20px; text-decoration:none;">Add Student</a>
    <a href="/view-students" style="color:white; margin-right:20px; text-decoration:none;">View Students</a>
    <a href="/update-student" style="color:white; margin-right:20px; text-decoration:none;">Update Student</a>
    <a href="/delete-student" style="color:white; margin-right:20px; text-decoration:none;">Delete Student</a>
    <a href="/logout" style="color:#ffaaaa; text-decoration:none;">Logout</a>
</nav>

<div class="container">
    <h2>Add Student</h2>

    <form action="/students/save" method="post">

        <label>First Name</label>
        <input type="text" name="firstName" required>

        <label>Last Name</label>
        <input type="text" name="lastName" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <br><br>

        <button type="submit">Save Student</button>

    </form>

    <br>

    <a href="/dashboard">
        <button type="button">Back to Dashboard</button>
    </a>

</div>

</body>
</html>
