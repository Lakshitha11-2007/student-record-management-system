<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            text-align: center;
        }
        input, select {
            width: 300px;
            padding: 10px;
            margin: 10px 0;
            display: block;
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 10px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2196F3;
        }
    </style>
</head>
<body>

<h1>Attendance Management</h1>

<input type="number" id="studentId" placeholder="Student ID">
<input type="date" id="attendanceDate">
<select id="status">
    <option value="Present">Present</option>
    <option value="Absent">Absent</option>
</select>

<button onclick="saveAttendance()">Save Attendance</button>

<br>
<a href="/view-attendance">View Attendance Records</a>
<br>
<a href="/dashboard">Back to Dashboard</a>

<script>
    function saveAttendance() {
        let studentId = document.getElementById("studentId").value;
        let attendanceDate = document.getElementById("attendanceDate").value;
        let status = document.getElementById("status").value;

        if (!studentId || !attendanceDate) {
            alert("Please fill all fields");
            return;
        }

        fetch("/api/attendance/add", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                studentId: studentId,
                attendanceDate: attendanceDate,
                status: status
            })
        })
        .then(response => {
            if (response.ok) {
                alert("Attendance Saved Successfully");
                document.getElementById("studentId").value = "";
                document.getElementById("attendanceDate").value = "";
            } else {
                alert("Failed to save attendance");
            }
        })
        .catch(error => {
            alert("Error: " + error);
        });
    }
</script>

</body>
</html>
