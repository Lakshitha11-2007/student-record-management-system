<!DOCTYPE html>
<html>
<head>
    <title>View Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #2196F3;
            color: white;
        }
        .delete-btn {
            background-color: #e53e3e;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #c53030;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2196F3;
        }
    </style>
</head>
<body>

<h1>Attendance Records</h1>

<table id="attendanceTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Student ID</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <!-- Rows inserted here -->
    </tbody>
</table>

<a href="/attendance">Add New Attendance</a>
<br>
<a href="/dashboard">Back to Dashboard</a>

<script>
    function loadAttendance() {
        fetch("/api/attendance/all")
            .then(response => response.json())
            .then(data => {
                let tbody = document.querySelector("#attendanceTable tbody");
                tbody.innerHTML = "";
                data.forEach(record => {
                    let row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${record.id}</td>
                        <td>${record.studentId}</td>
                        <td>${record.attendanceDate}</td>
                        <td>${record.status}</td>
                        <td><button class="delete-btn" onclick="deleteRecord(${record.id})">Delete</button></td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(error => console.error("Error fetching attendance:", error));
    }

    function deleteRecord(id) {
        if (!confirm("Are you sure you want to delete this record?")) {
            return;
        }
        fetch(`/api/attendance/delete/${id}`, {
            method: "DELETE"
        })
        .then(response => {
            if (response.ok) {
                alert("Deleted successfully");
                loadAttendance();
            } else {
                alert("Failed to delete");
            }
        })
        .catch(error => alert("Error: " + error));
    }

    loadAttendance();
</script>

</body>
</html>
