<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Students</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            margin:20px;
        }

        h2{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#007BFF;
            color:white;
        }

        .btn{
            padding:8px 15px;
            color:white;
            text-decoration:none;
            border-radius:5px;
            border:none;
            cursor:pointer;
            font-size:14px;
        }

        .add{
            background:green;
        }

        .edit{
            background:orange;
        }

        .delete{
            background:red;
        }

        .action-form{
            display:inline;
        }
    </style>

</head>
<body>

<h2>Student Record Management System</h2>

<br>

<a th:href="@{/students/add-student}" class="btn add">Add Student</a>

<br><br>

<table>

<tr>
    <th>ID</th>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Email</th>
    <th>Actions</th>
</tr>

<tr th:each="student : ${students}">

    <td th:text="${student.studentId}"></td>
    <td th:text="${student.firstName}"></td>
    <td th:text="${student.lastName}"></td>
    <td th:text="${student.email}"></td>

    <td>

        <a th:href="@{/students/edit-student(studentId=${student.studentId})}" class="btn edit">
            Edit
        </a>

        <form th:action="@{/students/delete}" method="post" class="action-form"
              onsubmit="return confirm('Delete this student?');">
            <input type="hidden" name="studentId" th:value="${student.studentId}" />
            <button type="submit" class="btn delete">Delete</button>
        </form>

    </td>

</tr>

</table>

</body>
</html>
